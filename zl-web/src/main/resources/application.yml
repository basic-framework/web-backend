server:
  port: 8080
spring:
  profiles:
    active: dev
    include: file,extend  # 引入"file"环境的配置（即application-file.yml）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${spring.datasource.druid.driver-class-name}
      url: ${spring.datasource.druid.url}
      username: ${spring.datasource.druid.username}
      password: ${spring.datasource.druid.password}
  data:
    redis:
      host: ${spring.data.redis.host}
      port: ${spring.data.redis.port}
      database: ${spring.data.redis.database}
#      password: ${spring.data.redis.password}

  ai:
    openai:
      base-url: ${spring.ai.openai.base-url}
      api-key: ${spring.ai.openai.api-key}
      chat:
        options:
          model: qwen-max-latest
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
    vectorstore:
      redis:
        initialize-schema: true
        index: 0
        prefix: "doc:" # 向量库key前缀



mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.lgh.model.entity

  configuration:
    map-underscore-to-camel-case: true

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: sk-ea422ccad9354bc0afb3784e46154364
      model-name: qwen-plus
      log-requests: true #请求消息日志
      log-responses: true #响应消息日志


zl:
  framework:
    security:
      ignore-url:
        - /resource/menus/**
        - /resource/myButten/**
        - /customer/**
        - /web/login
        - /web/logout
        - /web/**
        - /ws/**
        - /doc.html/**
        - /*-swagger/**
        - /swagger-resources/**
        - /v3/api-docs/**
        - /webjars/**
        - /common/**
        - /swagger-ui/**
      defaule-password: 123456

  # token配置
  token:
    # 令牌自定义标识
    header: Authorization
    # 令牌密钥
    secret: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyz
    # 令牌有效期（默认30分钟）
    expireTime: 1800000
  aliyun:
    access-key-id: ${zl.aliyun.access-key-id}
    access-key-secret: ${zl.aliyun.access-key-secret}









#日志记录
logging:
  level:
    com:
      lgh:
        manage:
          mapper: debug
          service: info
          controller: info